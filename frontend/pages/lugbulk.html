<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudsUp — LUGBULK 2026 Parts Catalogue</title>
<link rel="stylesheet" href="../css/shared.css">
<style>
/* ── PAGE LAYOUT ── */
.page-header{background:var(--dark);padding:22px 32px 18px}
.page-header-inner{max-width:1200px;margin:0 auto}
.page-title{font-size:22px;font-weight:800;color:var(--yellow);margin-bottom:4px;letter-spacing:-.3px}
.page-sub{font-size:13px;color:rgba(255,255,255,.5);display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.stat-pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}

.content{max-width:1200px;margin:0 auto;padding:18px 20px;display:grid;grid-template-columns:250px 1fr;gap:16px;align-items:start}

/* ── SIDEBAR ── */
.sidebar{position:sticky;top:72px;display:flex;flex-direction:column;gap:10px}
.filter-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.fc-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--hint);margin-bottom:10px}
.price-row{display:flex;gap:6px;align-items:center;margin-top:4px}
.price-inp{flex:1;border:1px solid var(--border2);border-radius:6px;padding:6px 7px;font-size:12px;outline:none;min-width:0}
.price-inp:focus{border-color:var(--yellow)}
.color-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.color-item{display:flex;align-items:center;gap:7px;padding:3px 4px;border-radius:5px;cursor:pointer;font-size:12px;transition:background .1s}
.color-item:hover{background:var(--bg)}
.color-item.on{background:var(--yellow-bg)}
.color-dot{width:16px;height:16px;border-radius:50%;border:1px solid rgba(0,0,0,.12);flex-shrink:0}
.color-name{flex:1;color:var(--text2)}
.color-cnt{font-size:10px;color:var(--hint)}
.apply-btn{width:100%;background:var(--dark);border:none;border-radius:7px;color:var(--yellow);font-size:13px;font-weight:700;padding:8px;cursor:pointer;margin-top:8px}
.apply-btn:hover{background:#2d2d4e}
.clear-btn{width:100%;background:none;border:1px solid var(--border2);border-radius:7px;color:var(--muted);font-size:12px;padding:6px;cursor:pointer;margin-top:5px}
.clear-btn:hover{background:var(--bg);color:var(--text)}

/* ── MAIN ── */
.main-col{display:flex;flex-direction:column;gap:12px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px}
.search-wrap{display:flex;flex:1;min-width:180px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;overflow:hidden}
.search-wrap input{flex:1;border:none;background:none;padding:7px 10px;font-size:13px;outline:none;min-width:0}
.search-wrap button{background:none;border:none;padding:0 10px;font-size:16px;color:var(--muted);cursor:pointer}
.sort-sel{border:1px solid var(--border2);border-radius:7px;padding:7px 9px;font-size:12px;outline:none;background:#fff;cursor:pointer}
.view-btns{display:flex;gap:3px}
.vbtn{background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:6px 9px;font-size:14px;cursor:pointer;transition:all .12s}
.vbtn.on{background:var(--dark);color:var(--yellow);border-color:var(--dark)}
.results-info{font-size:12px;color:var(--muted);white-space:nowrap}

/* ── GRID ── */
.parts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.part-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:all .17s;cursor:pointer;position:relative}
.part-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:#d8d7d2}
.part-img-wrap{height:130px;background:var(--bg);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.part-img{width:110px;height:110px;object-fit:contain;transition:transform .2s}
.part-card:hover .part-img{transform:scale(1.06)}
.part-img-fallback{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff}
.img-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);font-size:11px;color:var(--hint)}
.avail-badge{position:absolute;top:7px;left:7px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px}
.ab-ok{background:#E1F5EE;color:#085041}
.ab-low{background:#FFF8DC;color:#8a6a00}
.ab-none{background:#FCEBEB;color:#791F1F}
.part-body{padding:10px}
.color-swatch{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.1);display:inline-block;margin-right:4px;vertical-align:middle;flex-shrink:0}
.part-ids{font-size:10px;color:var(--hint);margin-bottom:6px;line-height:1.5}
.part-color{display:flex;align-items:center;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:600}
.price-row-card{display:flex;align-items:baseline;gap:4px;margin-bottom:7px}
.price-main{font-size:15px;font-weight:800;color:var(--text)}
.price-label{font-size:10px;color:var(--hint)}
.price-range{font-size:10px;color:var(--hint);margin-left:auto}
.card-actions{display:flex;gap:5px}
.ca{flex:1;border:none;border-radius:6px;font-size:11px;font-weight:600;padding:5px;cursor:pointer;transition:all .12s;text-align:center}
.ca-add{background:var(--yellow);color:var(--dark)}
.ca-add:hover{background:var(--yellow-dark)}
.ca-wish{background:var(--bg);color:var(--muted);border:1px solid var(--border2)}
.ca-wish:hover{background:#fff;color:var(--text)}
.ca-wish.wished{color:var(--red);border-color:var(--red)}

/* ── LIST VIEW ── */
.parts-list{display:flex;flex-direction:column;gap:7px}
.part-row{background:#fff;border:1px solid var(--border);border-radius:var(--radius-md);display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:all .13s}
.part-row:hover{border-color:#ccc;box-shadow:var(--shadow-sm)}
.row-img{width:52px;height:52px;object-fit:contain;flex-shrink:0;background:var(--bg);border-radius:7px;border:1px solid var(--border)}
.row-img-fb{width:52px;height:52px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.row-info{flex:1;min-width:0}
.row-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-meta{font-size:11px;color:var(--muted);margin-top:1px}
.row-price{text-align:right;flex-shrink:0}
.row-price-main{font-size:14px;font-weight:800}
.row-price-range{font-size:10px;color:var(--hint)}
.row-actions{display:flex;gap:5px;flex-shrink:0}
.ra{border:none;border-radius:6px;font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer}
.ra-add{background:var(--yellow);color:var(--dark)}
.ra-wish{background:var(--bg);border:1px solid var(--border2);color:var(--muted)}
.ra-wish.wished{color:var(--red);border-color:var(--red)}

/* ── PAGINATION ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 0}
.pag{width:34px;height:34px;border:1px solid var(--border2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;background:#fff;transition:all .12s;font-weight:500}
.pag:hover{background:var(--bg);border-color:#ccc}
.pag.on{background:var(--dark);color:var(--yellow);border-color:var(--dark);font-weight:700}
.pag.dots{border:none;background:none;cursor:default;color:var(--hint)}

/* ── CART ── */
.cart-fab{position:fixed;bottom:24px;right:24px;background:var(--dark);border:none;border-radius:50px;color:var(--yellow);font-size:14px;font-weight:700;padding:12px 20px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.28);z-index:100;display:flex;align-items:center;gap:8px;transition:all .15s}
.cart-fab:hover{background:#2d2d4e;transform:translateY(-2px)}
.cart-badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;min-width:20px;text-align:center}

.cart-panel{position:fixed;right:0;top:0;bottom:0;width:380px;background:#fff;border-left:1px solid var(--border);z-index:200;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-8px 0 28px rgba(0,0,0,.12)}
.cart-panel.open{transform:translateX(0)}
.cart-head{background:var(--dark);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cart-head h3{color:var(--yellow);font-size:16px;font-weight:700}
.cart-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;padding:0}
.cart-close:hover{color:#fff}
.cart-body{flex:1;overflow-y:auto;padding:12px}
.cart-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.cart-item{display:flex;align-items:center;gap:10px;padding:8px;background:var(--bg);border-radius:var(--radius-md);margin-bottom:7px}
.ci-img{width:44px;height:44px;object-fit:contain;background:#fff;border-radius:6px;border:1px solid var(--border);flex-shrink:0}
.ci-img-fb{width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-sub{font-size:10px;color:var(--hint);margin-top:1px}
.ci-qty{display:flex;align-items:center;gap:4px}
.ci-qbtn{width:22px;height:22px;border:1px solid var(--border2);border-radius:4px;background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.ci-qbtn:hover{background:var(--bg)}
.ci-qval{font-size:12px;font-weight:700;min-width:20px;text-align:center}
.ci-price{font-size:12px;font-weight:700;flex-shrink:0}
.ci-del{background:none;border:none;color:var(--hint);cursor:pointer;font-size:14px;padding:2px;flex-shrink:0}
.ci-del:hover{color:var(--red)}
.cart-footer{padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0;background:#fff}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cart-total-lbl{font-size:13px;color:var(--muted)}
.cart-total-val{font-size:20px;font-weight:800}
.checkout-btn{width:100%;background:var(--yellow);border:none;border-radius:var(--radius-md);color:var(--dark);font-size:14px;font-weight:700;padding:12px;cursor:pointer;margin-bottom:7px}
.checkout-btn:hover{background:var(--yellow-dark)}
.export-btn{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-md);color:var(--text2);font-size:13px;padding:9px;cursor:pointer}
.export-btn:hover{background:#fff}

/* ── LOADING ── */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:400;gap:14px}
.loading-overlay.hidden{display:none}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:14px;font-weight:600;color:var(--text2)}

/* ── DETAIL MODAL ── */
.detail-modal{max-width:600px}
.dm-top{display:flex;gap:20px;margin-bottom:18px}
.dm-img{width:160px;height:160px;object-fit:contain;background:var(--bg);border-radius:var(--radius-md);border:1px solid var(--border);flex-shrink:0}
.dm-img-fb{width:160px;height:160px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:700;color:#fff;flex-shrink:0}
.dm-info h3{font-size:18px;font-weight:800;margin-bottom:4px}
.dm-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.dm-row{padding:6px 0;border-bottom:1px solid #f5f4ef;font-size:12px}
.dm-row:nth-last-child(-n+2){border-bottom:none}
.dm-lbl{color:var(--muted);margin-bottom:1px}
.dm-val{font-weight:600}
.price-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:14px}
.price-table th{background:var(--bg);padding:7px 10px;text-align:left;font-weight:700;color:var(--text2);font-size:11px}
.price-table td{padding:7px 10px;border-bottom:1px solid #f5f4ef}
.price-table tr:last-child td{border-bottom:none}
.dm-actions{display:flex;gap:8px;margin-top:14px}
</style>
</head>

<!-- Load the 3.5MB data file -->
<script>
// Smart loader: tries API first (paginated, fast), falls back to static 3.5MB JS
(function(){
  const h = window.location.hostname;
  const onRender = h.includes('onrender.com');
  const API = onRender ? 'https://studsup-api.onrender.com' : 
              (h==='localhost'||h==='127.0.0.1') ? 'http://localhost:8000' : null;

  function imgUrl(blcol, blp, eid) {
    // Rebrickable on Render (BrickLink blocks onrender referrer), BrickLink locally
    if(onRender) return `https://cdn.rebrickable.com/media/parts/elements/${eid}.jpg`;
    return `https://img.bricklink.com/ItemImage/PN/${blcol}/${blp}.png`;
  }

  function loadFromAPI(api) {
    Promise.all([
      fetch(api+'/api/parts?per_page=200&sort=avail_avg_usd&order=asc&in_stock=false').then(r=>r.json()),
      fetch(api+'/api/parts/colors').then(r=>r.json())
    ]).then(([partsData, colors]) => {
      window.PARTS = partsData.items.map(p => ({
        eid:p.element_id, lcol:p.lego_color_id||0, blcol:p.bl_color_id,
        did:p.design_id||0, blp:p.bl_part_id,
        cname:p.bl_color_name, ccss:p.color_css||'#ccc',
        img:imgUrl(p.bl_color_id, p.bl_part_id, p.element_id),
        slots:p.avail_lots||0, sqty:p.sold_qty||0,
        smin:p.sold_min_usd||0, savg:p.sold_avg_usd||0, smax:p.sold_max_usd||0,
        alots:p.avail_lots||0, aqty:p.avail_qty||0,
        amin:p.avail_min_usd||0, aavg:p.avail_avg_usd||0, amax:p.avail_max_usd||0,
      }));
      window.BL_COLOR_NAMES = {};
      colors.forEach(c => { window.BL_COLOR_NAMES[c.bl_color_id] = c.bl_color_name; });
      window.PARTS_TOTAL = partsData.total;
      initApp();
    }).catch(err => {
      console.warn('API load failed, trying static file:', err.message);
      loadStatic();
    });
  }

  function loadStatic() {
    const s = document.createElement('script');
    s.src = 'lugbulk_data.js';
    s.onload = () => initApp();
    s.onerror = () => {
      document.getElementById('loadingOverlay').innerHTML =
        '<div style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">⚠️</div>' +
        '<div style="font-size:16px;font-weight:700;margin-bottom:8px">Could not load parts data</div>' +
        '<div style="font-size:13px;color:#888">API is offline and static file failed to load.<br>' +
        'Try refreshing in 30 seconds.</div></div>';
    };
    document.head.appendChild(s);
  }

  if(API) {
    loadFromAPI(API);
  } else {
    loadStatic();
  }
})();
</script>
<script>
// ── STATE ────────────────────────────────────────────────────────────────────
let filtered   = [];
let currentPage = 1;
const PER_PAGE  = 48;
let currentView = 'grid';
let cart        = {};   // key: eid_blcol → {part, qty}
let wishlist    = new Set();
let searchTimer = null;

// ── INIT ─────────────────────────────────────────────────────────────────────
function initApp() {
  document.getElementById('loadingOverlay').classList.add('hidden');

  // Stats
  const uniqueColors = new Set(PARTS.map(p => p.blcol)).size;
  document.getElementById('statTotal').textContent   = PARTS.length.toLocaleString() + ' parts';
  document.getElementById('statColors').textContent  = uniqueColors + ' colors';

  // Build color list sidebar
  renderColorList('');

  // Initial render
  applyFilters();
}

// ── COLOR LIST ───────────────────────────────────────────────────────────────
let selectedColors = new Set();

function renderColorList(search) {
  const q = search.toLowerCase();
  // Count per color
  const counts = {};
  PARTS.forEach(p => { counts[p.blcol] = (counts[p.blcol]||0) + 1; });

  const colors = Object.entries(BL_COLOR_NAMES)
    .map(([id, name]) => ({id: parseInt(id), name, cnt: counts[parseInt(id)]||0}))
    .filter(c => !q || c.name.toLowerCase().includes(q))
    .sort((a,b) => a.name.localeCompare(b.name));

  const el = document.getElementById('colorList');
  el.innerHTML = colors.map(c => `
    <div class="color-item ${selectedColors.has(c.id)?'on':''}" onclick="toggleColor(${c.id},this)">
      <div class="color-dot" style="background:${getCss(c.id)}"></div>
      <span class="color-name">${c.name}</span>
      <span class="color-cnt">${c.cnt}</span>
    </div>`).join('');
}

function getCss(id) {
  const map = {};
  PARTS.forEach(p => { if(!map[p.blcol]) map[p.blcol] = p.ccss; });
  return map[id] || '#ccc';
}

function toggleColor(id, el) {
  if(selectedColors.has(id)) { selectedColors.delete(id); el.classList.remove('on'); }
  else { selectedColors.add(id); el.classList.add('on'); }
  const cnt = selectedColors.size;
  document.getElementById('colorSelCount').textContent = cnt ? `(${cnt} selected)` : '';
}

// ── FILTERS ──────────────────────────────────────────────────────────────────
function applyFilters() {
  const search  = document.getElementById('searchInp').value.trim().toLowerCase();
  const pMin    = parseFloat(document.getElementById('priceMin').value) || 0;
  const pMax    = parseFloat(document.getElementById('priceMax').value) || Infinity;
  const avail   = document.querySelector('input[name="avail"]:checked').value;
  const sort    = document.getElementById('sortSel').value;

  filtered = PARTS.filter(p => {
    if(search) {
      const s = search;
      if(!String(p.eid).includes(s) &&
         !String(p.blp).includes(s) &&
         !String(p.did).includes(s) &&
         !p.cname.toLowerCase().includes(s)) return false;
    }
    if(p.aavg < pMin || p.aavg > pMax) return false;
    if(avail === 'instock'  && p.aqty === 0) return false;
    if(avail === 'soldonly' && p.sqty === 0) return false;
    if(selectedColors.size > 0 && !selectedColors.has(p.blcol)) return false;
    return true;
  });

  // Sort
  const dir = sort.endsWith('-d') ? -1 : 1;
  const key = sort.replace('-d','');
  filtered.sort((a,b) => dir * ((a[key]||0) - (b[key]||0)));

  currentPage = 1;
  renderPage();
}

function clearFilters() {
  document.getElementById('searchInp').value = '';
  document.getElementById('priceMin').value  = '';
  document.getElementById('priceMax').value  = '';
  document.querySelector('input[name="avail"][value="all"]').checked = true;
  document.getElementById('colorSearch').value = '';
  selectedColors.clear();
  renderColorList('');
  document.getElementById('colorSelCount').textContent = '';
  applyFilters();
}

function debouncedSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 280);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderPage() {
  const total = filtered.length;
  const start = (currentPage - 1) * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);

  document.getElementById('resultsInfo').textContent =
    total.toLocaleString() + ' results (page ' + currentPage + ' of ' + Math.ceil(total/PER_PAGE) + ')';

  const container = document.getElementById('partsContainer');
  if(currentView === 'grid') {
    container.innerHTML = `<div class="parts-grid">${slice.map(cardHTML).join('')}</div>`;
  } else {
    container.innerHTML = `<div class="parts-list">${slice.map(rowHTML).join('')}</div>`;
  }

  renderPagination(total);
  // Lazy-load images
  requestAnimationFrame(lazyLoadImages);
}

function availBadge(p) {
  if(p.aqty === 0)   return '<span class="avail-badge ab-none">Out of stock</span>';
  if(p.aqty < 10)    return '<span class="avail-badge ab-low">Low stock</span>';
  return '<span class="avail-badge ab-ok">' + p.alots + ' sellers</span>';
}

function imgTag(p, cls='part-img') {
  return `<img class="${cls}" data-src="${p.img}"
    src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="
    alt="Part ${p.blp}" onerror="this.style.display='none';this.nextElementSibling&&(this.nextElementSibling.style.display='flex')">
  <div class="part-img-fallback" style="background:${p.ccss};display:none">${initials(p.cname)}</div>`;
}

function initials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
}

function cardHTML(p) {
  const wished = wishlist.has(p.eid);
  const price  = p.aavg > 0 ? '$'+p.aavg.toFixed(3) : (p.amin > 0 ? '$'+p.amin.toFixed(3) : '—');
  return `<div class="part-card" onclick="openDetail(${p.eid})">
    <div class="part-img-wrap">
      ${imgTag(p,'part-img')}
      ${availBadge(p)}
    </div>
    <div class="part-body">
      <div class="part-color">
        <span class="color-swatch" style="background:${p.ccss}"></span>${p.cname}
      </div>
      <div class="part-ids">BL: ${p.blp} &nbsp;·&nbsp; EID: ${p.eid}</div>
      <div class="price-row-card">
        <span class="price-main">${price}</span>
        <span class="price-label">avg</span>
        ${p.amin>0?`<span class="price-range">$${p.amin.toFixed(2)}–$${p.amax.toFixed(2)}</span>`:''}
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="ca ca-add" onclick="addToCart(${p.eid})">+ Cart</button>
        <button class="ca ca-wish ${wished?'wished':''}" id="w${p.eid}"
          onclick="toggleWish(${p.eid})">${wished?'♥':'♡'}</button>
      </div>
    </div>
  </div>`;
}

function rowHTML(p) {
  const wished = wishlist.has(p.eid);
  const price  = p.aavg > 0 ? '$'+p.aavg.toFixed(3) : '—';
  return `<div class="part-row" onclick="openDetail(${p.eid})">
    <div class="img-wrap" style="position:relative">
      ${imgTag(p,'row-img')}
    </div>
    <div class="row-info">
      <div class="row-name">
        <span class="color-swatch" style="background:${p.ccss}"></span>${p.cname}
      </div>
      <div class="row-meta">BL: ${p.blp} &nbsp;·&nbsp; EID: ${p.eid} &nbsp;·&nbsp; ${p.alots} sellers &nbsp;·&nbsp; ${p.aqty.toLocaleString()} in stock</div>
    </div>
    <div class="row-price">
      <div class="row-price-main">${price}</div>
      <div class="row-price-range">${p.amin>0?'$'+p.amin.toFixed(2)+'–$'+p.amax.toFixed(2):''}</div>
    </div>
    <div class="row-actions" onclick="event.stopPropagation()">
      <button class="ra ra-add" onclick="addToCart(${p.eid})">+ Cart</button>
      <button class="ra ra-wish ${wished?'wished':''}" id="wr${p.eid}"
        onclick="toggleWish(${p.eid})">${wished?'♥':'♡'}</button>
    </div>
  </div>`;
}

// ── LAZY IMAGES ───────────────────────────────────────────────────────────────
function lazyLoadImages() {
  const imgs = document.querySelectorAll('img[data-src]');
  const io = new IntersectionObserver((entries, obs) => {
    entries.forEach(e => {
      if(e.isIntersecting) {
        e.target.src = e.target.dataset.src;
        delete e.target.dataset.src;
        obs.unobserve(e.target);
      }
    });
  }, {rootMargin:'200px'});
  imgs.forEach(img => io.observe(img));
}

// ── PAGINATION ────────────────────────────────────────────────────────────────
function renderPagination(total) {
  const pages  = Math.ceil(total / PER_PAGE);
  const cur    = currentPage;
  const el     = document.getElementById('pagination');
  if(pages <= 1){ el.innerHTML=''; return; }

  let html = `<div class="pag" onclick="goPage(${Math.max(1,cur-1)})">‹</div>`;
  const show = new Set([1, 2, pages-1, pages, cur-1, cur, cur+1].filter(p=>p>=1&&p<=pages));
  let prev = 0;
  [...show].sort((a,b)=>a-b).forEach(p => {
    if(p - prev > 1) html += `<div class="pag dots">…</div>`;
    html += `<div class="pag ${p===cur?'on':''}" onclick="goPage(${p})">${p}</div>`;
    prev = p;
  });
  html += `<div class="pag" onclick="goPage(${Math.min(pages,cur+1)})">›</div>`;
  el.innerHTML = html;
}

function goPage(n) {
  currentPage = n;
  renderPage();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── VIEW ──────────────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('vGrid').classList.toggle('on', v==='grid');
  document.getElementById('vList').classList.toggle('on', v==='list');
  renderPage();
}

// ── CART ──────────────────────────────────────────────────────────────────────
function getPartByEid(eid) { return PARTS.find(p => p.eid === eid); }

function addToCart(eid) {
  const p = getPartByEid(eid);
  if(!p) return;
  const key = String(eid);
  if(cart[key]) cart[key].qty++;
  else cart[key] = {part:p, qty:1};
  updateCartUI();
  toast('Added to cart ✓');
}

function removeFromCart(key) {
  delete cart[key];
  updateCartUI();
  renderCartPanel();
}

function changeQty(key, delta) {
  if(!cart[key]) return;
  cart[key].qty = Math.max(1, cart[key].qty + delta);
  updateCartUI();
  renderCartPanel();
}

function updateCartUI() {
  const count = Object.values(cart).reduce((s,c)=>s+c.qty,0);
  document.getElementById('cartBadge').textContent = count;
  document.getElementById('cartFab').style.display = count > 0 ? '' : 'none';
}

function toggleCart() {
  const panel = document.getElementById('cartPanel');
  panel.classList.toggle('open');
  if(panel.classList.contains('open')) renderCartPanel();
}

function renderCartPanel() {
  const items = Object.entries(cart);
  const body  = document.getElementById('cartBody');
  const footer = document.getElementById('cartFooter');
  if(items.length === 0) {
    body.innerHTML = '<div class="cart-empty">🛒<br>Your cart is empty.<br>Add parts from the catalogue.</div>';
    footer.style.display = 'none';
    return;
  }
  body.innerHTML = items.map(([key,ci]) => {
    const p = ci.part;
    return `<div class="cart-item">
      <img class="ci-img" src="${p.img}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="ci-img-fb" style="background:${p.ccss};display:none">${initials(p.cname)}</div>
      <div class="ci-info">
        <div class="ci-name">BL ${p.blp} — ${p.cname}</div>
        <div class="ci-sub">EID ${p.eid} · avg $${p.aavg.toFixed(3)}</div>
        <div class="ci-qty" style="margin-top:4px">
          <button class="ci-qbtn" onclick="changeQty('${key}',-1)">−</button>
          <span class="ci-qval">${ci.qty}</span>
          <button class="ci-qbtn" onclick="changeQty('${key}',1)">+</button>
        </div>
      </div>
      <span class="ci-price">$${(p.aavg*ci.qty).toFixed(2)}</span>
      <button class="ci-del" onclick="removeFromCart('${key}')" title="Remove">🗑</button>
    </div>`;
  }).join('');

  const total = Object.values(cart).reduce((s,ci)=>s+(ci.part.aavg*ci.qty),0);
  document.getElementById('cartTotal').textContent = '$'+total.toFixed(2);
  footer.style.display = '';
}

function exportCart() {
  const rows = ['BL Part ID,Color,Element ID,Qty,Avg Price USD,Total USD'];
  Object.values(cart).forEach(ci => {
    const p = ci.part;
    rows.push(`${p.blp},"${p.cname}",${p.eid},${ci.qty},${p.aavg.toFixed(3)},${(p.aavg*ci.qty).toFixed(2)}`);
  });
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'studsup_cart_lugbulk2026.csv';
  a.click();
}

// ── WISHLIST ──────────────────────────────────────────────────────────────────
function toggleWish(eid) {
  if(wishlist.has(eid)) wishlist.delete(eid);
  else wishlist.add(eid);
  // Update both grid and list button if present
  [document.getElementById('w'+eid), document.getElementById('wr'+eid)].forEach(btn => {
    if(!btn) return;
    const on = wishlist.has(eid);
    btn.textContent = on ? '♥' : '♡';
    btn.classList.toggle('wished', on);
  });
}

// ── DETAIL MODAL ──────────────────────────────────────────────────────────────
function openDetail(eid) {
  const p = getPartByEid(eid);
  if(!p) return;
  const blUrl = `https://www.bricklink.com/v2/catalog/catalogitem.page?P=${p.blp}`;
  document.getElementById('detailContent').innerHTML = `
    <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    <div class="dm-top">
      <img class="dm-img" src="${p.img}" alt="Part ${p.blp}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="dm-img-fb" style="background:${p.ccss};display:none">${initials(p.cname)}</div>
      <div class="dm-info">
        <h3>BL Part ${p.blp} &mdash; ${p.cname}</h3>
        <div style="display:flex;align-items:center;gap:7px;margin:6px 0 12px">
          <span class="color-swatch" style="background:${p.ccss};width:14px;height:14px"></span>
          <span style="font-size:13px;color:var(--muted)">${p.cname}</span>
        </div>
        <div class="dm-grid">
          <div class="dm-row"><div class="dm-lbl">Element ID</div><div class="dm-val">${p.eid}</div></div>
          <div class="dm-row"><div class="dm-lbl">Design ID</div><div class="dm-val">${p.did}</div></div>
          <div class="dm-row"><div class="dm-lbl">BL Part ID</div><div class="dm-val">${p.blp}</div></div>
          <div class="dm-row"><div class="dm-lbl">BL Color ID</div><div class="dm-val">${p.blcol}</div></div>
          <div class="dm-row"><div class="dm-lbl">LEGO Color ID</div><div class="dm-val">${p.lcol}</div></div>
          <div class="dm-row"><div class="dm-lbl">Available lots</div><div class="dm-val">${p.alots}</div></div>
        </div>
      </div>
    </div>
    <table class="price-table">
      <tr><th></th><th>Min price</th><th>Avg price</th><th>Qty-wtd avg</th><th>Max price</th></tr>
      <tr>
        <td style="font-weight:700">📈 Sold</td>
        <td>${p.smin>0?'$'+p.smin.toFixed(3):'—'}</td>
        <td>${p.savg>0?'$'+p.savg.toFixed(3):'—'}</td>
        <td>—</td>
        <td>${p.smax>0?'$'+p.smax.toFixed(3):'—'}</td>
      </tr>
      <tr>
        <td style="font-weight:700">🏪 Available</td>
        <td>${p.amin>0?'$'+p.amin.toFixed(3):'—'}</td>
        <td><strong>${p.aavg>0?'$'+p.aavg.toFixed(3):'—'}</strong></td>
        <td>—</td>
        <td>${p.amax>0?'$'+p.amax.toFixed(3):'—'}</td>
      </tr>
      <tr>
        <td colspan="5" style="font-size:11px;color:var(--hint);padding-top:8px">
          ${p.sqty} sold · ${p.slots} sold lots &nbsp;|&nbsp; ${p.aqty.toLocaleString()} available · ${p.alots} available lots
        </td>
      </tr>
    </table>
    <div class="dm-actions">
      <button class="btn btn-yellow btn-sm" onclick="addToCart(${p.eid});closeModal('detailModal')">+ Add to cart</button>
      <button class="btn btn-outline btn-sm" onclick="toggleWish(${p.eid})">♡ Wishlist</button>
      <a href="${blUrl}" target="_blank" rel="noopener" class="btn btn-outline btn-sm">Open on BrickLink ↗</a>
    </div>`;
  openModal('detailModal');
}
</script>
</body>
</html>
