services:
  - type: web
    name: studsup-api
    env: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health

  - type: web
    name: studsup-frontend
    env: static
    region: frankfurt
    plan: free
    rootDir: .
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
